<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Web Chess - CrazyGames Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        body {
            background-color: #1e272e; color: #ecf0f1; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; margin-top: 20px;
        }
        h2 { margin-bottom: 5px; }
        .box { background: #2c3e50; padding: 20px; border-radius: 8px; width: 420px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); margin-bottom: 15px;}
        
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; color: white; margin: 5px; font-size: 14px; transition: 0.2s;}
        button:hover { opacity: 0.8; }
        .btn-green { background: #27ae60; }
        .btn-blue { background: #2980b9; }
        .btn-orange { background: #d35400; }
        .btn-red { background: #c0392b; width: 100%; margin-top: 10px;}
        input, select { padding: 10px; width: 70%; border-radius: 5px; border: none; font-size: 14px; text-align: center; margin-bottom: 10px;}
        
        #myBoard { width: 400px; border: 4px solid #34495e; background: #fff; margin: 0 auto;}
        .timer-bar { display: flex; justify-content: space-between; width: 400px; margin: 10px 0; font-size: 20px; font-weight: bold; background: #34495e; padding: 10px; border-radius: 5px; box-sizing: border-box;}
        .active-timer { color: #f1c40f; text-shadow: 0 0 10px #f1c40f; }
        
        .stats { font-size: 14px; color: #bdc3c7; margin-bottom: 10px; }
        
        #resultOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.85); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.5s;
        }
        #resultOverlay.show { opacity: 1; pointer-events: all; }
        .anim-text { font-size: 60px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; text-shadow: 2px 2px 10px #000; transform: scale(0.5); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
        #resultOverlay.show .anim-text { transform: scale(1); }
        .win-color { color: #2ecc71; }
        .lose-color { color: #e74c3c; }
        .draw-color { color: #f1c40f; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h2>Multiplayer Web Chess</h2>

    <div id="profileBox" class="box">
        <h3>Create Account</h3>
        <p style="font-size:12px; color:#bdc3c7;">Scores saved via CrazyGames SDK</p>
        <input type="text" id="usernameInput" placeholder="Enter player name">
        <button class="btn-green" onclick="saveProfile()">Save & Continue</button>
    </div>

    <div id="menuBox" class="box hidden">
        <div class="stats" id="playerStats">Loading Stats...</div>
        <hr style="border-color:#7f8c8d; margin-bottom: 15px;">
        
        <label>Set Time (Minutes):</label><br>
        <select id="timeSelect">
            <option value="3">3 Minutes</option>
            <option value="5" selected>5 Minutes</option>
            <option value="10">10 Minutes</option>
        </select>

        <div style="margin-top: 15px;">
            <button class="btn-orange" onclick="startLocalGame()">Play Local</button>
        </div>
        
        <div style="margin-top: 15px; border-top: 1px solid #7f8c8d; padding-top: 15px;">
            <button class="btn-green" onclick="hostGame()">Host Online Game</button>
            <p id="myCodeDisplay" style="color:#2ecc71; font-weight:bold;"></p>
            <hr style="border-color:#7f8c8d; margin: 15px 0;">
            <input type="text" id="joinCode" placeholder="Enter Host Code">
            <button class="btn-blue" id="joinBtn" onclick="joinGame()">Join Game</button>
        </div>
    </div>

    <div id="gameBox" class="hidden" style="display: flex; flex-direction: column; align-items: center;">
        <div id="topTimer" class="timer-bar">Opponent: <span>00:00</span></div>
        <div id="myBoard"></div>
        <div id="bottomTimer" class="timer-bar active-timer">You: <span>00:00</span></div>
        <div style="width: 400px;"><button class="btn-red" onclick="acceptDefeat()">🏳️ Accept Defeat</button></div>
    </div>

    <div id="resultOverlay">
        <div id="resultText" class="anim-text"></div>
        <div id="resultReason" style="font-size: 20px; color: white; margin-bottom: 20px;"></div>
        <button class="btn-blue" onclick="location.reload()">Back to Menu</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>

    <script>
        // --- CRAZYGAMES SDK & PROFILE LOGIC ---
        let profile = { name: "Player", wins: 0, losses: 0, draws: 0 };
        let sdkActive = false;

        // Initialize SDK on Load
        window.addEventListener('load', async function() {
            try {
                await window.CrazyGames.SDK.init();
                sdkActive = true;
                let saved = await window.CrazyGames.SDK.data.getItem('chessProfile');
                if (saved) loadProfileData(saved);
            } catch (e) {
                console.log("Running locally: Falling back to LocalStorage.");
                let localData = localStorage.getItem('chessProfile');
                if (localData) loadProfileData(localData);
            }
        });

        function loadProfileData(dataString) {
            profile = JSON.parse(dataString);
            document.getElementById('profileBox').classList.add('hidden');
            document.getElementById('menuBox').classList.remove('hidden');
            updateStatsDisplay();
        }

        async function saveProfile() {
            let name = document.getElementById('usernameInput').value.trim();
            if (!name) return alert("Please enter a name");
            profile = { name: name, wins: 0, losses: 0, draws: 0 };
            
            await syncDataToCloud();
            
            document.getElementById('profileBox').classList.add('hidden');
            document.getElementById('menuBox').classList.remove('hidden');
            updateStatsDisplay();
        }

        function updateStatsDisplay() {
            document.getElementById('playerStats').innerHTML = 
                `👤 <strong>${profile.name}</strong> | Wins: <span style="color:#2ecc71">${profile.wins}</span> | Losses: <span style="color:#e74c3c">${profile.losses}</span>`;
        }

        async function updateLocalRecord(result) {
            if (result === 'win') profile.wins++;
            else if (result === 'lose') profile.losses++;
            else profile.draws++;
            
            await syncDataToCloud();
            updateStatsDisplay();
        }

        async function syncDataToCloud() {
            let dataString = JSON.stringify(profile);
            if (sdkActive) {
                try { await window.CrazyGames.SDK.data.setItem('chessProfile', dataString); } 
                catch(e) { console.error("CrazyGames Save Failed"); }
            } else {
                localStorage.setItem('chessProfile', dataString); // Fallback
            }
        }

        // --- MULTIPLAYER & GAME LOGIC ---
        let board = null, game = new Chess(), conn = null;
        let playMode = '', myColor = 'white', gameActive = false;
        let timeWhite = 0, timeBlack = 0, timerInterval = null;

        // High Performance PeerJS for NAT Traversal
        let peer = new Peer({
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun.services.mozilla.com' }
                ]
            }
        });

        // HOST RECEIVING CONNECTION (RACE CONDITION FIXED)
        peer.on('connection', (connection) => {
            conn = connection;
            
            // FIX: Wait for the connection to be fully 'open' before starting
            conn.on('open', () => {
                setupNetwork();
                let minutes = parseInt(document.getElementById('timeSelect').value);
                
                // Now safely send the start signal to Player 2
                conn.send({ type: 'start', time: minutes });
                setupGame('host', minutes);
            });
        });

        function startLocalGame() {
            setupGame('local', parseInt(document.getElementById('timeSelect').value));
        }

        function hostGame() {
            document.getElementById('myCodeDisplay').innerText = "Your Host Code: " + peer.id;
        }

        function joinGame() {
            let code = document.getElementById('joinCode').value.trim();
            if(!code) return alert("Enter code!");
            document.getElementById('joinBtn').innerText = "Connecting...";
            conn = peer.connect(code);
            conn.on('open', setupNetwork);
            conn.on('error', () => { alert("Connection failed."); document.getElementById('joinBtn').innerText = "Join Game"; });
        }

        function setupNetwork() {
            conn.on('data', (data) => {
                if (data.type === 'start') setupGame('join', data.time);
                else if (data.type === 'move') { game.move(data.move); board.position(game.fen()); checkGameState(); }
                else if (data.type === 'resign') triggerEndGame('win', 'Opponent accepted defeat!');
                else if (data.type === 'timeout') triggerEndGame('win', 'Opponent ran out of time!');
            });
        }

        function setupGame(mode, minutes) {
            playMode = mode;
            document.getElementById('menuBox').classList.add('hidden');
            document.getElementById('gameBox').classList.remove('hidden');

            timeWhite = minutes * 60; timeBlack = minutes * 60;
            myColor = (playMode === 'join') ? 'black' : 'white';
            gameActive = true;

            let config = {
                draggable: true, position: 'start', orientation: myColor,
                onDragStart: onDragStart, onDrop: onDrop, onSnapEnd: onSnapEnd,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            };
            board = Chessboard('myBoard', config);
            updateTimerUI();
            
            // Analytics: Tell CrazyGames gameplay started
            if(sdkActive) { try { window.CrazyGames.SDK.game.gameplayStart(); } catch(e){} }
            
            clearInterval(timerInterval); timerInterval = setInterval(tickTimer, 1000);
        }

        function onDragStart(source, piece) {
            if (!gameActive || game.game_over()) return false;
            if (playMode !== 'local') {
                if ((myColor === 'white' && piece.search(/^b/) !== -1) || (myColor === 'black' && piece.search(/^w/) !== -1)) return false;
                if ((myColor === 'white' && game.turn() === 'b') || (myColor === 'black' && game.turn() === 'w')) return false;
            } else {
                if ((game.turn() === 'w' && piece.search(/^b/) !== -1) || (game.turn() === 'b' && piece.search(/^w/) !== -1)) return false;
            }
        }

        function onDrop(source, target) {
            let moveInfo = { from: source, to: target, promotion: 'q' };
            let move = game.move(moveInfo);
            if (move === null) return 'snapback';
            if (playMode !== 'local' && conn) conn.send({ type: 'move', move: moveInfo });
            checkGameState();
        }

        function onSnapEnd() { board.position(game.fen()); }

        function tickTimer() {
            if (!gameActive) return;
            game.turn() === 'w' ? timeWhite-- : timeBlack--;
            updateTimerUI();
            if (timeWhite <= 0 || timeBlack <= 0) {
                gameActive = false;
                let loserColor = timeWhite <= 0 ? 'white' : 'black';
                if (playMode === 'local') triggerEndGame('draw', `${loserColor === 'white' ? 'Black' : 'White'} wins on time!`);
                else if (myColor === loserColor) { conn.send({ type: 'timeout' }); triggerEndGame('lose', 'You ran out of time!'); }
            }
        }

        function updateTimerUI() {
            let fmt = (t) => `${Math.floor(Math.max(t, 0) / 60).toString().padStart(2, '0')}:${(Math.max(t, 0) % 60).toString().padStart(2, '0')}`;
            let topDiv = document.getElementById('topTimer'), botDiv = document.getElementById('bottomTimer');
            topDiv.classList.remove('active-timer'); botDiv.classList.remove('active-timer');

            if (playMode === 'local' || myColor === 'white') {
                botDiv.querySelector('span').innerText = fmt(timeWhite); topDiv.querySelector('span').innerText = fmt(timeBlack);
                game.turn() === 'w' ? botDiv.classList.add('active-timer') : topDiv.classList.add('active-timer');
            } else {
                botDiv.querySelector('span').innerText = fmt(timeBlack); topDiv.querySelector('span').innerText = fmt(timeWhite);
                game.turn() === 'b' ? botDiv.classList.add('active-timer') : topDiv.classList.add('active-timer');
            }
        }

        function checkGameState() {
            updateTimerUI();
            if (game.in_checkmate()) {
                if (playMode === 'local') triggerEndGame('draw', `Checkmate! ${game.turn() === 'w' ? 'Black' : 'White'} wins.`);
                else {
                    let loserColor = game.turn() === 'w' ? 'white' : 'black';
                    myColor === loserColor ? triggerEndGame('lose', 'You were Checkmated!') : triggerEndGame('win', 'Checkmate! You crushed them.');
                }
            } else if (game.in_draw() || game.in_stalemate()) triggerEndGame('draw', 'Game ended in a draw.');
        }

        function acceptDefeat() {
            if (!gameActive) return;
            if (playMode === 'local') triggerEndGame('draw', 'A player accepted defeat.');
            else { conn.send({ type: 'resign' }); triggerEndGame('lose', 'You accepted defeat.'); }
        }

        function triggerEndGame(result, reasonText) {
            gameActive = false; clearInterval(timerInterval);
            
            // Analytics: Tell CrazyGames gameplay stopped
            if(sdkActive) { try { window.CrazyGames.SDK.game.gameplayStop(); } catch(e){} }

            let overlay = document.getElementById('resultOverlay'), textElem = document.getElementById('resultText');
            document.getElementById('resultReason').innerText = reasonText;
            textElem.className = 'anim-text'; 

            if (result === 'win') { textElem.innerText = '🏆 YOU WIN!'; textElem.classList.add('win-color'); if (playMode !== 'local') updateLocalRecord('win'); } 
            else if (result === 'lose') { textElem.innerText = '💀 YOU LOSE!'; textElem.classList.add('lose-color'); if (playMode !== 'local') updateLocalRecord('lose'); } 
            else { textElem.innerText = '🤝 GAME OVER'; textElem.classList.add('draw-color'); }
            overlay.classList.add('show');
        }
    </script>
</body>
</html>
